<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proptalk 로그인</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            text-align: center;
            margin: 16px;
        }
        .logo { font-size: 24px; font-weight: 700; color: #1A73E8; margin-bottom: 4px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 32px; }
        .desc { color: #999; font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
        .error { color: #dc3545; font-size: 13px; margin-bottom: 16px; display: none; }
        .google-btn-wrap { display: flex; justify-content: center; }
        .loading { display: none; color: #888; font-size: 14px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🎙️ Proptalk</div>
        <p class="subtitle">세상 쉬운 업무 공유</p>
        <p class="desc">요금제 구매 및 구독 관리를 위해<br>Google 계정으로 로그인하세요.</p>
        <div class="error" id="error"></div>
        <div class="google-btn-wrap">
            <div id="g_id_onload"
                 data-client_id="{{ google_client_id }}"
                 data-callback="onGoogleSignIn"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="signin_with"
                 data-shape="rectangular"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>
        <div class="loading" id="loading">로그인 중...</div>
    </div>
    <script>
        async function onGoogleSignIn(response) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            try {
                const res = await fetch('/proptalk/billing/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_token: response.credential})
                });
                const data = await res.json();
                if (data.ok) {
                    sessionStorage.setItem('billing_token', data.token);
                    // 원래 가려던 페이지로 이동
                    const params = new URLSearchParams(window.location.search);
                    const next = params.get('next') || '/proptalk/billing/';
                    window.location.href = next + (next.includes('?') ? '&' : '?') + 'token=' + data.token;
                } else {
                    const el = document.getElementById('error');
                    el.textContent = data.error || '로그인 실패';
                    el.style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                }
            } catch(e) {
                const el = document.getElementById('error');
                el.textContent = '연결 오류';
                el.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
